<nav class="barra-navegacion">
  <div class="contenedor-nav">
    <span class="titulo-marca">TIENDA ANGULAR ONLINE</span>

    <div class="grupo-filtros">
      <select class="entrada-formulario" [(ngModel)]="categoriaSeleccionada">
        <option value="all">Todas las categorías</option>
        <option *ngFor="let cat of categorias" [value]="cat.valor">
          {{ cat.etiqueta }}
        </option>
      </select>

      <input
        type="text"
        class="entrada-formulario"
        placeholder="Marca"
        [(ngModel)]="marcaSeleccionada"
      />
      <input
        type="number"
        class="entrada-formulario"
        placeholder="Precio mínimo"
        [(ngModel)]="precioMinimo"
      />
      <button class="boton boton-primario" (click)="aplicarFiltro()">Filtrar</button>
    </div>

    <button class="boton boton-carrito" (click)="verCarrito()">
      🛒 Carrito
      <span class="globo-contador" *ngIf="cantidadCarrito() > 0">{{ cantidadCarrito() }}</span>
    </button>
  </div>
</nav>

<div class="contenedor-principal">
  <div class="cuadricula-productos">
    <div class="tarjeta" *ngFor="let producto of productosFiltrados">
      <img [src]="producto.thumbnail" [alt]="producto.title" class="imagen-tarjeta" />

      <div class="cuerpo-tarjeta">
        <h5 class="titulo-tarjeta">{{ producto.title }}</h5>
        <p class="texto-tarjeta">Categoría: {{ producto.category }}</p>
        <p class="texto-tarjeta">Marca: {{ producto.brand || 'N/A' }}</p>
        <p class="precio-tarjeta">$ {{ producto.price | number: '1.2-2' }}</p>

        <button
          class="boton boton-primario margen-superior-auto"
          (click)="agregarAlCarrito(producto)"
        >
          Añadir al carrito
        </button>
      </div>
    </div>
  </div>
</div>

<div class="superposicion-modal" *ngIf="mostrarModalCarrito">
  <div class="contenido-modal">
    <div class="cabecera-modal">
      <h5 class="titulo-modal">Carrito</h5>
      <button class="boton-cerrar" (click)="cerrarCarrito()">✖</button>
    </div>

    <div class="cuerpo-modal">
      <ul class="lista-carrito" *ngIf="cantidadCarrito() > 0; else carritoVacio">
        <li class="articulo-carrito" *ngFor="let articulo of carrito()">
          <span>{{ articulo.title }} - ${{ articulo.price | number: '1.2-2' }}</span>
          <button class="boton boton-peligro boton-pequeno" (click)="eliminarDelCarrito(articulo)">
            Eliminar
          </button>
        </li>
      </ul>

      <ng-template #carritoVacio>
        <p class="texto-centrado">El carrito está vacío</p>
      </ng-template>
    </div>

    <div class="pie-modal">
      <button
        class="boton boton-exito"
        [disabled]="cantidadCarrito() === 0"
        (click)="procesarCompra()"
      >
        Comprar
      </button>
    </div>
  </div>
</div>
